# ============================================
# 크롤링 전용 Docker Compose (Firebase 이전 전까지 사용)
# 사용법: docker compose run --rm python
# ============================================
services:
  python:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: game_schedule_python
    volumes:
      - ./src:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: ${DB_HOST_DOCKER:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-game_schedule}
      DB_USER: ${DB_USER:-game_user}
      DB_PASS: ${DB_PASS:-game_pass1234}
